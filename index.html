<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Chamados</title>
   <link rel="stylesheet" href="css/index.css">
</head>
<body>
<img src="img/logo1.png" alt="Logo" class="logo">
    <div class="container">

        <div class="card">

        <div class="card">

        <div class="card">

    <script>

        });

    <style>
        .login-button {

            font-size: 1em;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
            transition: background-color 0.3s;
        }

        .login-button:hover {
